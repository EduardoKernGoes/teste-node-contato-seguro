<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Criar Conta</title>
        <link rel="stylesheet" href="/styles/login-create-account.css">
    </head>
    <body>
        <main>
            <h1>Crie sua conta!!!</h1>
            <form action="/login" method="post">
                <div>
                    <label>
                        Nome de usuário:
                    </label>
                    <input type="text" name="user">
                </div>
                <div>
                    <label>
                        E-mail:
                    </label>
                    <input type="text" name="email">
                </div>
                <div>
                    <label>
                        Senha:
                    </label>
                    <input id="password" type="password" name="password">
                </div>
                <div id="div_repeat_password">
                    <label>
                        Repitir Senha:
                    </label>
                    <input id="repeat_password" type="password" name="repeat_password">
                </div>
                <button class="btn" type="submit">Criar Conta</button>
                <a href="./login.html" class="btn">Já tem uma conta?</a>
            </form>
        </main>
        <script src="/scripts/create-account.js"></script>
    </body>
</html>

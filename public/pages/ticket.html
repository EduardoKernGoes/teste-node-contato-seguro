<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="/styles/ticket.css">
        <script src="/components/header.js"></script>
    </head>
    <body>
        <site-header></site-header>
        <main>
            <div style="display: flex; justify-content: space-between; align-items: end;">
                <h1 id="title">Titulo</h1>
                <h2 id="date">Data</h2>
            </div>
            <p id="description">Lorem ipsum dolor sit amet consectetur adipisicing elit. Tenetur architecto, incidunt aliquam enim dolorem aperiam eos repellat nemo voluptates sunt repudiandae libero cupiditate quasi, totam magnam nesciunt, saepe iusto impedit!</p>
            <form style="margin-top: 50px;">
                <div style="display: flex; flex-direction: row; justify-content: center; gap: 50px">
                    <div>
                        <label for="priority">Prioridade</label>
                        <select id="priority" name="priority" style="width: min-content;">
                            <option id="HIGH" value="HIGH">Alta</option>
                            <option id="MEDIUM" value="MEDIUM">Média</option>
                            <option id="LOW" value="LOW">Baixa</option>
                        </select>
                    </div>
                    <div>
                        <label for="channel">Canal</label>
                        <select id="channel" name="channel" style="width: min-content;">
                            <option id="ouvidoria" value="ouvidoria">Ouvidoria</option>
                            <option id="sac" value="sac">SAC</option>
                            <option id="suporte_tecnico" value="suporte_tecnico">Suporte Técnico</option>
                            <option id="financeiro" value="financeiro">Financeiro</option>
                            <option id="fora_do_escopo" value="fora_do_escopo">Fora do escopo</option>
                        </select>
                    </div>
                    <div>
                        <label for="status">Status</label>
                        <input id="status" name="status" style="width: 100px;">
                    </div>
                </div>
                <button onclick="updateStatus()" style="display: block; margin: 20px auto; padding: 5px 10px;">Atualizar</button>
            </form>
        </main>
        <script src="/scripts/ticket.js"></script>
    </body>
</html>
